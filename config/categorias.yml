patrones_descarte:
  - patron: '^\s*box\s+\d'
    nota: '"Box 1", "Box 2" — etiqueta de empaque'
  - patron: '^\s*\d+\s+(box|stacking)\s*/?\s*$'
    nota: '"1 box", "2 stacking" — cantidades sueltas'
  - patron: '^\s*\d+\s+box\s+\d'
    nota: '"1 box 1" — cantidad+etiqueta'
  - patron: 'sticker label'
    nota: 'fragmento de empaque'
  - patron: 'opp bag'
    nota: 'tipo de bolsa de empaque'
  - patron: 'foam bag'
    nota: 'tipo de bolsa de empaque'
  - patron: '^fob ningbo'
    nota: 'nota de pricing FOB'
  - patron: '^vip price'
    nota: 'nota de pricing'
  - patron: '^\s*\d+\.\d+\s+\d+\s*$'
    nota: '"0.94 1" — pricing suelto'
  - patron: '^\s*\d+\s+\d+\s*1\s*$'
    nota: 'pricing suelto'
  - patron: '^the filter element replacement$'
    nota: 'componente de empaque'
  - patron: '^remote control by app'
    nota: 'feature descriptiva, no producto'
  - patron: '^usb (led )?set'
    nota: 'componente'
  - patron: '^national standard plug'
    nota: 'feature de plug, no producto'
  - patron: '^inner box'
    nota: 'caja interior (color box o corrugado), no producto'
  - patron: '^strengthen clip'
    nota: 'componente de refuerzo'
