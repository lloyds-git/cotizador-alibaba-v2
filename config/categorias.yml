# Catalogo de categorias y keywords del clasificador heuristico.
#
# Fuente de verdad. Para que los cambios surtan efecto en BD:
#     python -m app.cli seed-categorias
#
# Reglas del archivo:
#   - 'orden' define prioridad: numero menor gana. Categorias mas
#     especificas deben ir antes que las genericas. Ejemplo: 'pajaros'
#     antes que 'alimentadores' porque "hummingbird feeder" es pajaros.
#   - 'casa-jaula' al final porque es muy generico ('plastic pet kennel'
#     matchea muchas cosas).
#   - Keywords son substrings case-insensitive sobre la descripcion completa.
#     No son regex.
#
# Patrones de descarte: si la descripcion completa matchea cualquiera,
# se marca categoria='_descartar' (notas de pricing/empaque/etiquetas
# sueltas que Claude tomo como producto). Estos SI son regex.

