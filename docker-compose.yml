services:
  app:
    build: .
    image: cotizav2-bd:latest
    container_name: cotizav2-bd
    ports:
      - "8071:8081"
    # En Linux: usar UID/GID del host para que los archivos creados en data/
    # queden propiedad de tu usuario, no de root.
    # En Windows: las vars no existen y se usa el default 1000:1000 (no afecta NTFS).
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Montar el proyecto completo para edición en vivo + acceso a intermedios.
      - .:/app
      # Volumen anónimo para evitar que el bind oculte el egg-info instalado.
      - /app/app.egg-info
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    restart: unless-stopped
