<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Mascotas BD{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
<header class="bg-white shadow px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Productos Mascotas</h1>
  <nav class="text-sm">
    <a href="/" class="hover:underline">Productos</a>
    <a href="/aranceles" class="hover:underline ml-4">Aranceles</a>
    <a href="/exportar" class="hover:underline ml-4">Exportar marcados</a>
  </nav>
</header>
<main class="p-6">
  {% block content %}{% endblock %}
</main>
</body>
</html>
